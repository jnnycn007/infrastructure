apiVersion: v1
kind: ConfigMap
metadata:
  name: keydb-cache-config
  namespace: keydb-cache
data:
  keydb-config: |
    # Set server thread count to 16.
    server-threads 16

    # Set maximum memory to 112 GiB.
    maxmemory 112gb

    # Evict cache based on Least Recently Used (LRU).
    maxmemory-policy allkeys-lru

    # Disable RDB and AOF persistence.
    save ""
    appendonly no
